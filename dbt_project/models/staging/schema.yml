version: 2

models:
  - name: stg_orders
    columns:
      - name: ORDER_ID
        tests:
          - not_null
          - unique
      - name: CUSTOMER_ID
        tests:
          - not_null
      - name: ORDER_STATUS
        tests:
          - not_null
          - accepted_values:
              values:
                - approved
                - canceled
                - created
                - delivered
                - invoiced
                - processing
                - shipped
                - unavailable

  - name: stg_customers
    columns:
      - name: CUSTOMER_ID
        tests:
          - not_null

  - name: stg_products
    columns:
      - name: PRODUCT_ID
        tests:
          - not_null
          - unique
